version: 3

options:
  repo_type: PNPM
  package_delimiter: "@"
  release_recommended_groups: true

groups:
  shared:
    paths:
      - packages/shared.net.platformapi
    tag_prefix: "@osdk/shared.net.platformapi@"
  foundry:
    paths:
      - packages/foundry
      - packages/foundry.*
      - packages/internal.foundry*
      - packages/deprecated/*
    tag_prefix: "@osdk/foundry@"
  gotham:
    paths:
      - packages/gotham
      - packages/gotham.*
    tag_prefix: "@osdk/gotham@"
